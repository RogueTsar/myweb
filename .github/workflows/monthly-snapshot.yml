name: Save Monthly Spotify Snapshot

on:
  schedule:
    - cron: '0 2 1 * *'   # 1st of every month at 02:00 UTC
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Save Spotify snapshot
        run: node scripts/save-snapshot.js
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: monthly Spotify snapshot'
          file_pattern: 'assets/data/history/*.json'
