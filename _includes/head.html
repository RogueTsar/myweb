<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ site.description }}">

<!-- Open Graph -->
<meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">

<!-- Fonts: Space Grotesk (body/UI), Instrument Serif (display), Space Mono (code/playlist), Caveat (signature) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&family=Caveat:wght@400;500&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">

<!-- Favicon -->
<link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">

<!-- Theme (inline to prevent flash) -->
<script>
(function(){var t=localStorage.getItem('vs-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();
</script>
